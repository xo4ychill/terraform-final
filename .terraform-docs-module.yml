# ======================================================================
# 📦 Terraform Docs конфигурация для модулей (Registry-style)
# ======================================================================
version: "0.21.0"

formatter: "markdown table"

output:
  # README.md внутри каждого модуля
  file: "README.md"

  # inject — вставляет только в блоки BEGIN/END
  mode: "inject"

# ======================================================================
# Какие секции генерировать
# ======================================================================
sections:
  show:
    - header        # заголовок модуля
    - requirements  # версии Terraform и провайдеров
    - providers     # используемые провайдеры
    - resources     # ресурсы модуля
    - inputs        # входные переменные
    - outputs       # выходные значения

# ======================================================================
# Настройки форматирования
# ======================================================================
settings:
  anchor: true          # ссылки на секции (#inputs и т.д.)
  default: true        # стандартное поведение terraform-docs
  escape: false        # не экранировать markdown

  indent: 2            # отступы в таблицах

  sort:
    enabled: true      # включить сортировку
    by: required       # сначала required inputs

  type: true           # показывать типы переменных