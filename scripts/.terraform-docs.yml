# ======================================================================
# 📦 Terraform Docs конфигурация (ROOT проекта)
# ======================================================================

version: ">=0.21.0"

formatter: "markdown table"

output:
  # Итоговый файл общей документации проекта
  file: "docs/DIRECTORY_STRUCTURE.md"

  # inject — обновляет только блок BEGIN/END
  mode: "inject"
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->  

# ======================================================================
# Какие секции показывать в документации
# ======================================================================
sections:
  show:
    - requirements  # версия Terraform и провайдеров
    - providers     # используемые провайдеры
    - resources     # ресурсы инфраструктуры
    - inputs        # входные параметры root модуля
    - outputs       # выходные значения
    - footer

# ======================================================================
# Настройки форматирования таблиц
# ======================================================================
settings:
  anchor: true          # генерация якорей для навигации
  default: true         # дефолтные правила terraform-docs
  escape: false         # не экранировать markdown символы
  indent: 2             # читаемые отступы

  sort:
    enabled: true       # сортировка таблиц
    by: required        # required inputs сверху

  type: true            # показывать типы переменных

  lockfile: true        # учитывать terraform.lock.hcl
  recursive: true