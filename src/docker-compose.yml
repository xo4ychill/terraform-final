# 📦 Пример файла .env (не коммитить в Git!):
# ======================================================================
#
# ======================================================================
# Конфигурация приложения — файл .env
# ======================================================================
# ⚠️ Этот файл содержит чувствительные данные!
# 1. Добавьте .env в .gitignore
# 2. Не передавайте файл по незащищённым каналам
# 3. Ротируйте секреты регулярно
#
# ----------------------------------------------------------------------
# Контейнерный реестр
# ----------------------------------------------------------------------
# Получите значение через: terraform output registry_url
# REGISTRY_URL=cr.yandex/crp1234567890abcdef
#
# ----------------------------------------------------------------------
# Подключение к базе данных (Yandex Managed MySQL)
# ----------------------------------------------------------------------
# Endpoint кластера (rw — для записи, ro — для чтения)
# Получите через: yc mysql cluster get <id> --format json | jq .connection_string
# DB_HOST=cluster-id.rw.mdb.yandexcloud.net
# DB_PORT=3306
#
# Имя базы данных (должна быть создана заранее)
# DB_NAME=app_production
#
# Пользователь БД (не root! с минимальными необходимыми правами)
# DB_USER=app_user
#
# ⚠️ Пароль — храните в секретах, не в Git!
# Для production рассмотрите интеграцию с Yandex Lockbox
# DB_PASSWORD=SuperSecretPassword123!
#
# ----------------------------------------------------------------------
# Дополнительные настройки приложения (опционально)
# ----------------------------------------------------------------------
# Уровень логирования: debug, info, warning, error
# APP_LOG_LEVEL=info
#
# Таймауты (в секундах)
# APP_REQUEST_TIMEOUT=30
# APP_DB_TIMEOUT=10
#
# Флаги функциональности (feature flags)
# APP_ENABLE_CACHE=true
# APP_MAINTENANCE_MODE=false
#
#
#
# ======================================================================
# 🔐 Как защитить .env файл:
# ======================================================================
# 1. Добавить в .gitignore
# echo ".env" >> .gitignore
#
# 2. Проверить, что файл не отслеживается
# git status  # .env не должен отображаться
#
# 3. Установить строгие права доступа к файлу
# chmod 600 .env  # чтение/запись только для владельца
#
# 4. (Опционально) Зашифровать файл для хранения в репозитории
#    с использованием git-crypt или Ansible Vault:
# git-crypt add-gpg-user user@example.com
#    или
# ansible-vault encrypt .env
#
#
