# 📋 ЧЕК-ЛИСТ ПЕРЕД ПРОДАКШЕН-ДЕПЛОЕМ
# ======================================================================
#
# [ ] Образ имеет фиксированный тег версии (не только `latest`)
# [ ] Секреты вынесены из .env в secrets manager
# [ ] Настроены лимиты ресурсов (CPU, memory)
# [ ] Включена ротация логов (max-size, max-file)
# [ ] Healthcheck проверен и адекватен реальному состоянию приложения
# [ ] Настроен мониторинг и алертинг на unhealthy статус
# [ ] Образ просканирован на уязвимости (trivy / grype)
# [ ] .env файл добавлен в .gitignore
# [ ] Есть процедура отката (rollback) на предыдущую версию
# [ ] Проведено нагрузочное тестирование с текущими лимитами ресурсов