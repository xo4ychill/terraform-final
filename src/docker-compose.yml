# ======================================================================
# Docker Compose — запуск FastAPI-приложения с подключением к БД
# ======================================================================


services:
 # Сервис веб-приложения (FastAPI)
  web:
    # Образ приложения из частного реестра
    # Переменные подставляются из окружения или файла .env
    image: ${REGISTRY_URL}/app:latest

    # Фиксированное имя контейнера для удобства логирования и мониторинг
    container_name: fastapi-app

    # Политика перезапуска: контейнер перезапускается при всех ошибках, кроме явной остановки
    restart: unless-stopped

    # Проброс портов: <порт_хоста>:<порт_контейнера>
    # Доступ к приложению будет по http://localhost:80
    ports:
      - "80:5000"                # Хост:80 → Контейнер:5000 (внутренний порт приложения)
    
    # Переменные окружения для подключения к БД и конфигурации приложения
    # Значения берутся из файла .env или экспортируются в оболочке  
    environment:
      - DB_HOST=${DB_HOST}                  # Хост базы данных (например, внутреннее имя кластера YC)
      - DB_PORT=${DB_PORT}                  # Порт БД (обычно 3306 для MySQL)
      - DB_NAME=${DB_NAME}                  # Имя логической базы данных
      - DB_USER=${DB_USER}                  # Пользователь для подключения
      - DB_PASSWORD=${DB_PASSWORD}          # Пароль (чувствительные данные)
    
    # Подключение к пользовательской сети для изоляции и внутреннего DNS
    networks:
      - app-network
    
    # Healthcheck — проверка работоспособности контейнера оркестратором  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]     # Выполняем HTTP-запрос к корню приложения
      interval: 30s                                             # Интервал между проверками
      timeout: 5s                                               # Таймаут ожидания ответа
      retries: 3                                                # Количество повторных попыток перед пометкой контейнера как "unhealthy"
      start_period: 10s                                         # Время на запуск приложения до начала проверок

# Определение пользовательских сетей
networks:
  app-network:
    driver: bridge                         # Стандартный драйвер: контейнеры в сети видят друг друга по именам сервисов