# ======================================================================
# Docker Compose — Развёртывание веб-приложения (Production-ready)
# ======================================================================
# 🎯 Назначение файла:
#    Оркестрация многоконтейнерного приложения для локальной разработки,
#    тестирования и деплоя на одиночный хост (ВМ, bare-metal).
#
# 🔹 Архитектурная схема:
#    ┌─────────────────────────────────┐
#    │         Docker Host             │
#    │  ┌─────────────────────────┐    │
#    │  │     app-network         │    │
#    │  │  (bridge, internal)     │    │
#    │  │                         │    │
#    │  │  ┌─────────────┐        │    │
#    │  │  │   web:80    │◄───────┼────┼──► Интернет (порт 80)
#    │  │  │  (Nginx+PHP)│        │    │
#    │  │  └──────┬──────┘        │    │
#    │  │         │ DB connection │    │
#    │  │         ▼               │    │
#    │  │  ┌─────────────┐        │    │
#    │  │  │   MySQL     │        │    │
#    │  │  │ (managed)   │        │    │
#    │  │  └─────────────┘        │    │
#    │  └─────────────────────────┘    │
#    └─────────────────────────────────┘
#
# 🔹 Ключевые принципы:
#    ✅ Изоляция сервисов через пользовательскую сеть
#    ✅ Конфигурация через переменные окружения (.env)
#    ✅ Автоматический перезапуск при сбоях
#    ✅ Healthcheck для мониторинга "живости" приложения
#    ✅ Минимизация exposure: только порт 80 наружу
#
# 🔹 Требования:
#    - Docker Engine 20.10+ и Docker Compose v2.x
#    - Файл .env в той же директории с переменными конфигурации
#    - Образ приложения должен быть предварительно собран и загружен в реестр

# ----------------------------------------------------------------------
# Версия спецификации Compose
# ----------------------------------------------------------------------
# version: "3.9" — последняя версия формата для Docker Compose
# 🔹 Что это даёт:
#    - Поддержка всех современных директив (healthcheck, deploy, secrets)
#    - Совместимость с Docker Swarm mode (при необходимости)
#    - Чёткая валидация синтаксиса при запуске
#
# ⚠️ Важно: Начиная с Compose V2, версия становится опциональной,
#    но явное указание рекомендуется для:
#    - Воспроизводимости на разных хостах
#    - Избежания неявных поведений по умолчанию
#    - Документирования минимальных требований
version: "3.9"

# ======================================================================
# СЕКЦИЯ: SERVICES — Описание контейнеров приложения
# ======================================================================
# Каждый сервис — это шаблон для создания контейнера(ов).
# В данном проекте: один сервис `web`, который общается с внешним MySQL.
#
# 🔹 Почему MySQL не в compose-файле?
#    - В production используется Yandex Managed MySQL (внешний сервис)
#    - Это обеспечивает: бэкапы, HA, мониторинг, автоматические обновления
#    - Для локальной разработки можно добавить сервис `mysql` через profile
services:
  # ------------------------------------------------------------------
  # Сервис: web — Веб-приложение (Nginx + PHP-FPM)
  # ------------------------------------------------------------------
  # 🔹 Назначение:
  #    - Приём HTTP-запросов от пользователей
  #    - Обработка PHP-скриптов через FastCGI
  #    - Проксирование запросов к внешним сервисам (БД, API)
  #
  # 🔹 Образ:
  #    - Собирается через multi-stage Dockerfile (см. ../Dockerfile)
  #    - Минимальный размер (~50 MB) на базе Alpine
  #    - Содержит только runtime-зависимости, без инструментов сборки
  web:
    # ----------------------------------------------------------------
    # Образ контейнера
    # ----------------------------------------------------------------
    # 🔹 ${REGISTRY_URL} — переменная окружения, подставляется из .env
    #    Пример значения: cr.yandex/crp1234567890abcdef
    #
    # 🔹 /app:latest — имя репозитория и тег образа
    #    ⚠️ Внимание: тег "latest" неудобен для production!
    #    ✅ Рекомендация: используйте семантические версии:
    #       image: ${REGISTRY_URL}/app:v1.2.3
    #
    # 🔹 Подстановка переменных:
    #    - Происходит при запуске `docker compose up`
    #    - Источники (по приоритету):
    #      1. Переменные окружения хоста
    #      2. Файл .env в директории с compose-файлом
    #      3. Файл .env в домашней директории пользователя
    #
    # ⚠️ Если переменная не определена — подставится пустая строка!
    #    Это может привести к ошибке "invalid reference format".
    #    ✅ Решение: используйте .env файл с проверкой или default-значения.
    image: ${REGISTRY_URL}/app:latest

    # ----------------------------------------------------------------
    # Имя контейнера в Docker
    # ----------------------------------------------------------------
    # container_name: web-app
    # 🔹 Зачем явно задавать имя:
    #    - Удобство: `docker logs web-app` вместо `docker logs project_web_1`
    #    - Предсказуемость: имя не меняется при пересоздании сервиса
    #    - Совместимость: некоторые инструменты ожидают фиксированное имя
    #
    # ⚠️ Ограничение: с container_name нельзя масштабировать сервис (scale > 1)
    #    Для репликации используйте Docker Swarm или Kubernetes.
    container_name: web-app

    # ----------------------------------------------------------------
    # Политика перезапуска контейнера
    # ----------------------------------------------------------------
    # restart: unless-stopped
    # 🔹 Доступные значения:
    #    • no — никогда не перезапускать (по умолчанию)
    #    • always — всегда перезапускать, даже после `docker stop` (только после перезагрузки хоста)
    #    • on-failure — перезапускать только при ненулевом коде выхода
    #    • unless-stopped — перезапускать при сбоях, но не после явной остановки
    #
    # 🔹 Почему unless-stopped для production:
    #    ✅ Контейнер восстановится после краха приложения или хоста
    #    ✅ Админ может остановить контейнер для обслуживания, и он не включится сам
    #    ✅ Баланс между надёжностью и контролем
    #
    # ⚠️ Важно: перезапуск не лечит баги в коде!
    #    Если приложение падает циклически — смотрите логи и фиксируйте причину.
    restart: unless-stopped

    # ----------------------------------------------------------------
    # Проброс портов: хост ↔ контейнер
    # ----------------------------------------------------------------
    # ports:
    #   - "80:80"
    # 🔹 Формат: "HOST_PORT:CONTAINER_PORT"
    #    • Левая часть (80) — порт на хост-машине, доступный извне
    #    • Правая часть (80) — порт, который слушает приложение внутри контейнера
    #
    # 🔹 Что происходит:
    #    - Все запросы на http://<host-ip>:80 перенаправляются в контейнер
    #    - Docker создаёт правила iptables/NAT для маршрутизации трафика
    #
    # ⚠️ Безопасность:
    #    • Порт 80 открыт для ВСЕХ интерфейсов (0.0.0.0)
    #    • Для ограничения доступа используйте:
    #      - "127.0.0.1:80:80" — только локальный доступ (за reverse proxy)
    #      - Security Groups в облаке (Yandex Cloud, AWS и т.д.)
    #
    # 💡 Для HTTPS:
    #    - Терминируйте TLS на уровне Load Balancer / Ingress
    #    - Или добавьте порт 443 и настройте nginx на SSL внутри контейнера
    ports:
      - "80:80"

    # ----------------------------------------------------------------
    # Переменные окружения для конфигурации приложения
    # ----------------------------------------------------------------
    # 🔹 Назначение:
    #    - Передача конфигурации без изменения образа (12-factor app)
    #    - Изоляция секретов от кода (но не от docker inspect!)
    #    - Гибкость: один образ для dev/stage/prod с разными настройками
    #
    # 🔹 Список переменных:
    environment:
      # Хост базы данных
      # 🔹 В production: эндпоинт Yandex Managed MySQL
      #    Пример: cluster-id.rw.mdb.yandexcloud.net
      # 🔹 В разработке: имя сервиса `mysql` в том же compose-файле
      - DB_HOST=${DB_HOST}

      # Порт MySQL (обычно 3306)
      # 🔹 Фиксированное значение, но вынесено для гибкости
      - DB_PORT=${DB_PORT}

      # Имя базы данных для подключения
      # 🔹 Должна быть предварительно создана в модуле MySQL
      - DB_NAME=${DB_NAME}

      # Пользователь БД с правами на чтение/запись
      # 🔹 Не используйте root! Создайте отдельного пользователя с минимальными правами
      - DB_USER=${DB_USER}

      # ⚠️ ПАРОЛЬ — критически важная переменная!
      # 🔹 Риски:
      #    - Видна в `docker inspect web-app` (любой пользователь хоста)
      #    - Может попасть в логи при отладке
      #    - Хранится в .env файле (должен быть в .gitignore!)
      #
      # 🔹 Рекомендации для production:
      #    1. Используйте Docker Secrets (в Swarm mode)
      #    2. Подключайте секреты через volumes из Yandex Lockbox / HashiCorp Vault
      #    3. Используйте IAM-аутентификацию, если БД поддерживает
      #    4. Минимизируйте права пользователя БД (только нужные таблицы/операции)
      - DB_PASSWORD=${DB_PASSWORD}

    # ----------------------------------------------------------------
    # Сетевая конфигурация
    # ----------------------------------------------------------------
    # networks:
    #   - app-network
    # 🔹 Назначение пользовательской сети:
    #    • Изоляция: сервисы в app-network не видны извне без явного ports
    #    • DNS-разрешение: контейнеры видят друг друга по имени сервиса
    #    • Гибкость: можно подключить несколько сетей к одному контейнеру
    #
    # 🔹 Почему не использовать сеть по умолчанию (bridge)?
    #    - Нет встроенного DNS между контейнерами
    #    - Сложнее управлять правилами доступа
    #    - Меньше контроля над сетевым трафиком
    #
    # 💡 Для микросервисной архитектуры:
    #    - Создавайте отдельную сеть для каждого bounded context
    #    - Подключайте API Gateway к нескольким сетям при необходимости
    networks:
      - app-network

    # ----------------------------------------------------------------
    # Healthcheck — проверка "живости" приложения
    # ----------------------------------------------------------------
    # 🔹 Назначение:
    #    - Автоматическое определение, работает ли приложение корректно
    #    - Интеграция с оркестраторами (Swarm, Kubernetes) для self-healing
    #    - Мониторинг: статус healthy/unhealthy виден в `docker ps`
    #
    # 🔹 Параметры проверки:
    healthcheck:
      # Команда для проверки
      # 🔹 ["CMD", "curl", "-f", "http://localhost/"]
      #    • CMD — запуск команды напрямую (без shell), предпочтительный формат
      #    • curl -f — вернуть ошибку при HTTP-коде >= 400
      #    • http://localhost/ — проверка корневого эндпоинта
      #
      # 💡 Улучшение для production: создайте специальный эндпоинт /health
      #    который проверяет не только веб-сервер, но и:
      #    - Подключение к БД
      #    - Доступность кэша (Redis)
      #    - Состояние очередей (RabbitMQ)
      #    Пример: curl -f http://localhost/health?deep=1
      test: ["CMD", "curl", "-f", "http://localhost/"]

      # Интервал между проверками
      # 🔹 30s — баланс между оперативностью обнаружения сбоев и нагрузкой
      # 💡 Для критичных сервисов можно уменьшить до 10-15s
      interval: 30s

      # Таймаут выполнения команды проверки
      # 🔹 5s — если curl не ответил за 5 секунд, считаем проверку проваленной
      # ⚠️ Слишком малый таймаут может давать ложные срабатывания при высокой нагрузке
      timeout: 5s

      # Количество повторных неудачных проверок перед пометкой unhealthy
      # 🔹 3 попытки — защита от временных сетевых сбоев
      #    Контейнер будет помечен unhealthy только после 3×30s = 90s проблем
      retries: 3

      # Период ожидания после старта контейнера перед первой проверкой
      # 🔹 10s — даём приложению время на инициализацию (подключение к БД, кэш и т.д.)
      # ⚠️ Если приложение стартует дольше — увеличьте это значение!
      start_period: 10s

# ======================================================================
# СЕКЦИЯ: NETWORKS — Определение пользовательских сетей
# ======================================================================
# 🔹 Зачем явно объявлять сети:
#    - Контроль над драйвером и настройками сети
#    - Возможность подключения нескольких сервисов к одной сети
#    - Подготовка к масштабированию (Swarm, multi-host networking)
networks:
  # ------------------------------------------------------------------
  # app-network — изолированная сеть для компонентов приложения
  # ------------------------------------------------------------------
  app-network:
    # 🔹 Драйвер: bridge
    #    • Создаёт приватную сеть на хосте с внутренним DNS
    #    • Контейнеры получают автоматические IP из подсети 172.18.0.0/16
    #    • Изоляция: без явного ports трафик не выходит наружу
    #
    # 🔹 Альтернативные драйверы:
    #    • host — контейнер использует сеть хоста напрямую (быстрее, но меньше изоляции)
    #    • macvlan — контейнер получает IP из физической сети (для legacy-интеграций)
    #    • overlay — для multi-host сетей в Docker Swarm
    #
    # 💡 Расширенные настройки для production (раскомментировать при необходимости):
    #    driver_opts:
    #      com.docker.network.bridge.enable_ip_masquerade: "true"  # NAT для исходящего трафика
    #      com.docker.network.bridge.enable_icc: "false"           # Запрет межконтейнерного трафика по умолчанию
    #    ipam:
    #      config:
    #        - subnet: 172.20.0.0/24  # Фиксированный диапазон для предсказуемости
    driver: bridge

# ======================================================================
# 💡 РЕКОМЕНДАЦИИ ПО ПРОДАКШЕНУ
# ======================================================================

# 🔹 1. УПРАВЛЕНИЕ СЕКРЕТАМИ
# ----------------------------------------------------------------------
# ❌ Текущий подход (переменные окружения) имеет риски:
#    - Секреты видны в `docker inspect`
#    - Могут попасть в логи оркестратора или мониторинга
#    - .env файл должен быть строго в .gitignore
#
# ✅ Более безопасные альтернативы:
#
# Вариант А: Docker Secrets (требует Swarm mode)
# yaml
# services:
#   web:
#     secrets:
#       - db_password
# secrets:
#   db_password:
#     external: true  # Создаётся отдельно: echo "secret" | docker secret create db_password -
#
# Вариант Б: Подключение из внешнего secrets manager
# yaml
# services:
#   web:
#     volumes:
#       - type: bind
#         source: /run/secrets/db_password  # Смонтировано из Lockbox / Vault
#         target: /run/secrets/db_password
#         read_only: true
#
# Вариант В: Загрузка секретов при старте через entrypoint-скрипт
# bash
# # entrypoint.sh
# export DB_PASSWORD=$(yc lockbox payload get --id <secret-id> --key password)
# exec php-fpm81  # запуск основного процесса

# 🔹 2. ЛОГИРОВАНИЕ И МОНИТОРИНГ
# ----------------------------------------------------------------------
# 🔹 Настройка драйвера логирования для продакшена:
# yaml
# services:
#   web:
#     logging:
#       driver: json-file
#       options:
#         max-size: "10m"   # Ротация при достижении 10 MB
#         max-file: "3"     # Хранить последние 3 файла логов
#
# 🔹 Интеграция с централизованным сбором логов:
#    - Fluentd: driver: fluentd, опции: fluentd-address, tag
#    - Loki: driver: loki, опции: loki-url, loki-batch-size
#    - GELF (Graylog): driver: gelf, опции: gelf-address
#
# 🔹 Мониторинг метрик:
#    - Добавьте prometheus-node-exporter для метрик хоста
#    - Экспонируйте метрики приложения через /metrics эндпоинт
#    - Настройте алерты на: unhealthy статус, высокий latency, error rate

# 🔹 3. РЕСУРСЫ И ЛИМИТЫ
# ----------------------------------------------------------------------
# 🔹 Ограничение ресурсов для предотвращения "noisy neighbor":
# yaml
# services:
#   web:
#     deploy:
#       resources:
#         limits:
#           cpus: '2'        # Не более 2 CPU ядер
#           memory: 1G       # Не более 1 GB RAM
#         reservations:
#           cpus: '0.5'      # Гарантировано 0.5 CPU
#           memory: 256M     # Гарантировано 256 MB RAM
#
# 🔹 Почему это важно:
#    - Защита от утечек памяти в приложении
#    - Предсказуемая производительность при высокой нагрузке
#    - Корректное планирование ресурсов оркестратором

# 🔹 4. ОБНОВЛЕНИЕ И ДЕПЛОЙ
# ----------------------------------------------------------------------
# 🔹 Стратегия обновления без простоя (zero-downtime):
# bash
# # 1. Pull новой версии образа
# docker compose pull web
#
# # 2. Запуск нового контейнера параллельно со старым
# docker compose up -d --no-deps --scale web=2 web
#
# # 3. Проверка health нового контейнера
# docker ps --filter "name=web" --filter "health=healthy"
#
# # 4. Удаление старого контейнера
# docker compose up -d --no-deps --scale web=1 web
#
# 🔹 Для автоматизации используйте:
#    - Docker Swarm с rolling update
#    - Kubernetes с Deployment и readinessProbe
#    - CI/CD пайплайны с canary-деплоем

# 🔹 5. БЕЗОПАСНОСТЬ КОНТЕЙНЕРА
# ----------------------------------------------------------------------
# 🔹 Запуск с минимальными привилегиями:
# yaml
# services:
#   web:
#     user: "101:101"  # Запуск от не-root пользователя (UID:GID из образа)
#     read_only: true  # Корневая ФС только для чтения
#     tmpfs:           # Временные директории для записи
#       - /tmp
#       - /run/php
#     cap_drop:        # Удаление опасных Linux capabilities
#       - ALL
#     cap_add:         # Добавление только необходимых
#       - NET_BIND_SERVICE  # Для binding на порты < 1024
#     security_opt:
#       - no-new-privileges:true  # Запрет повышения привилегий
#
# 🔹 Сканирование образа перед деплоем:
# bash
# trivy image --severity HIGH,CRITICAL ${REGISTRY_URL}/app:latest
# grype ${REGISTRY_URL}/app:latest

# ======================================================================
# 🚀 БЫСТРЫЙ СТАРТ И УПРАВЛЕНИЕ
# ======================================================================

# 🔹 Предварительные требования:
# 1. Создать файл .env с переменными:
#    bash
#    cat > .env <<EOF
#    REGISTRY_URL=cr.yandex/crp1234567890abcdef
#    DB_HOST=cluster-id.rw.mdb.yandexcloud.net
#    DB_PORT=3306
#    DB_NAME=appdb
#    DB_USER=appuser
#    DB_PASSWORD=super-secret-password
#    EOF
#
# 2. Убедиться, что .env в .gitignore:
#    bash
#    echo ".env" >> .gitignore

# 🔹 Основные команды управления:
# bash
# # Запуск приложения в фоновом режиме
# docker compose up -d
#
# # Просмотр логов в реальном времени
# docker compose logs -f web
#
# # Проверка статуса и healthcheck
# docker compose ps
# docker inspect --format='{{.State.Health.Status}}' web-app
#
# # Остановка приложения
# docker compose down
#
# # Остановка с удалением томов (осторожно: потеря данных!)
# docker compose down -v
#
# # Пересборка и перезапуск (для разработки)
# docker compose up -d --build
#
# # Обновление образа без пересборки
# docker compose pull web && docker compose up -d

# 🔹 Отладка и диагностика:
# bash
# # Вход в контейнер для интерактивной отладки
# docker compose exec web ash
#
# # Проверка подключения к БД из контейнера
# docker compose exec web php -r "
#   \$mysqli = new mysqli(
#     getenv('DB_HOST'),
#     getenv('DB_USER'),
