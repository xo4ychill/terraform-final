services:
  web:
    image: ${REGISTRY_URL}/app:latest
    container_name: fastapi-app
    restart: unless-stopped
    ports:
      - "80:5000"                # пробрасываем порт 80 хоста на 5000 контейнера
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge